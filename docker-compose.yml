version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: svs_qdrant
    ports:
      - "6333:6333"   # REST + Web UI
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Uncomment to containerize the backend too
  # api:
  #   build: ./backend
  #   ports:
  #     - "8000:8000"
  #   env_file: .env
  #   depends_on:
  #     qdrant:
  #       condition: service_healthy
  #   volumes:
  #     - /tmp/video_chunks:/tmp/video_chunks

volumes:
  qdrant_data: